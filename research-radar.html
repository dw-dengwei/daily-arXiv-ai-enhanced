<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Daily Research Radar">
    <title>Daily Research Radar</title>
    <link rel="icon" type="image/png" href="assets/logo2-removebg-preview.png">
    <link rel="shortcut icon" type="image/png" href="assets/logo2-removebg-preview.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/research-radar.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/auth-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data-config.js?v=research-radar-5"></script>
    <script>
        Auth.requireAuth();
    </script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <div class="header-left">
                    <a href="index.html" class="github-button">
                        <span class="github-text">Daily papers</span>
                    </a>
                </div>
                <div class="header-center">
                    <a href="research-radar.html" class="site-logo">
                        <img src="assets/logo2-removebg-preview.png" alt="Daily Research Radar Logo" class="logo-image">
                        <span class="site-title">Daily Research Radar</span>
                    </a>
                </div>
                <div class="header-controls">
                    <a href="statistic.html" class="icon-button" title="Statistics">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

                        </svg>
                    </a>
                    <a href="settings.html" class="icon-button" title="Settings">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" fill="currentColor"/>

                    </a>
                </div>
            </div>
        </header>

        <main class="radar-container">
            <div class="radar-toolbar">
                <h1>Daily Research Radar</h1>
                <div class="radar-date-controls">
                    <button id="radarPreviousButton" class="radar-nav-button" type="button" disabled>Previous</button>
                    <select id="radarDateSelect" class="radar-date-select" disabled>
                        <option>Loading...</option>
                    </select>
                    <button id="radarNextButton" class="radar-nav-button" type="button" disabled>Next</button>
                </div>
            </div>
            <div id="radarStatus" class="radar-status">Loading reports...</div>
            <nav id="radarArchiveLinks" class="radar-archive-links" aria-label="Daily Research Radar archive"></nav>
            <article id="radarReport" class="radar-report"></article>
        </main>
    </div>
    <script src="js/research-radar.js?v=research-radar-5"></script>
</body>
</html>
