name: arXiv-daily-ai-enhanced

on:
  schedule:
    - cron: "30 1 * * *" # 北京时间每天上午 9:30 运行
  workflow_dispatch:
    # --- 手动控制面板：支持临时更换模型和账号 ---
    inputs:
      enable_ai:
        description: '是否开启 AI 总结？'
        required: true
        type: boolean
        default: true
      force_run:
        description: '是否强制运行？(勾选则无视去重检查)'
        required: true
        type: boolean
        default: false
      manual_model_name:
        description: '【可选】手动指定 AI 模型 (如 deepseek-chat)'
        required: false
        type: string
        default: ''
      manual_api_key:
        description: '【可选】临时 API Key (留空则使用 Secrets)'
        required: false
        type: string
        default: ''
      manual_base_url:
        description: '【可选】临时 Base URL'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install dependencies
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        uv sync
        
    - name: Crawl arXiv papers
      id: crawl_step
      run: |
        source .venv/bin/activate
        today=$(date -u "+%Y-%m-%d")
        echo "开始爬取 $today 的arXiv论文..."
        rm -f data/${today}.jsonl
        
        cd daily_arxiv
        # 注入环境变量：优先使用手动输入，否则使用 Secrets
        export OPENAI_API_KEY="${{ github.event.inputs.manual_api_key || secrets.OPENAI_API_KEY }}"
        export OPENAI_BASE_URL="${{ github.event.inputs.manual_base_url || secrets.OPENAI_BASE_URL }}"
        export MODEL_NAME="${{ github.event.inputs.manual_model_name || vars.MODEL_NAME }}"
        export LANGUAGE="${{ vars.LANGUAGE }}"
        export CATEGORIES="${{ vars.CATEGORIES }}"
        
        scrapy crawl arxiv -o ../data/${today}.jsonl
        
        if [ ! -f "../data/${today}.jsonl" ]; then
            echo "today_has_data=false" >> $GITHUB_OUTPUT
        else
            echo "today_has_data=true" >> $GITHUB_OUTPUT
            echo "crawl_date=$today" >> $GITHUB_OUTPUT
        fi

    - name: Hardcore Keyword Filtering
      if: steps.crawl_step.outputs.today_has_data == 'true'
      run: |
        source .venv/bin/activate
        today=${{ steps.crawl_step.outputs.crawl_date }}
        # 核心研究领域关键词：黎曼几何、随机分析、最优传输
        KEYWORDS="Riemannian|Manifold|Stochastic calculus|Brownian motion|Wasserstein|Optimal Transport|McKean-Vlasov|Curvature|Ricci|Martingale|Girsanov|DDSDE|Bismut|Distribution Dependent"
        
        python -c "
        import json, os, re
        input_file = 'data/${today}.jsonl'
        output_file = 'data/${today}_filtered.jsonl'
        pattern = re.compile(r'$KEYWORDS', re.IGNORECASE)
        if not os.path.exists(input_file): exit(0)
        with open(input_file, 'r') as f, open(output_file, 'w') as out:
            count = 0
            for line in f:
                data = json.loads(line)
                text = (data.get('title', '') + ' ' + data.get('abstract', '')).lower()
                if pattern.search(text):
                    out.write(json.dumps(data) + '\n')
                    count += 1
            print(f'✅ 过滤完成：提取了 {count} 篇相关论文。')
        if os.path.exists(output_file):
            os.replace(output_file, input_file)
        "

    - name: Check for duplicates
      id: dedup_check
      if: steps.crawl_step.outputs.today_has_data == 'true'
      run: |
        if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            echo "has_new_content=true" >> $GITHUB_OUTPUT
        else
            source .venv/bin/activate
            cd daily_arxiv
            set +e
            python daily_arxiv/check_stats.py
            dedup_exit_code=$?
            set -e
            if [ $dedup_exit_code -eq 0 ]; then
                echo "has_new_content=true" >> $GITHUB_OUTPUT
            else
                echo "has_new_content=false" >> $GITHUB_OUTPUT
            fi
        fi
        
    - name: AI Enhancement Processing
      if: |
        steps.dedup_check.outputs.has_new_content == 'true' && 
        (github.event_name == 'schedule' || github.event.inputs.enable_ai == 'true')
      run: |
        source .venv/bin/activate
        today=${{ steps.crawl_step.outputs.crawl_date }}
        cd ai
        export OPENAI_API_KEY="${{ github.event.inputs.manual_api_key || secrets.OPENAI_API_KEY }}"
        export OPENAI_BASE_URL="${{ github.event.inputs.manual_base_url || secrets.OPENAI_BASE_URL }}"
        export MODEL_NAME="${{ github.event.inputs.manual_model_name || vars.MODEL_NAME }}"
        export LANGUAGE="${{ vars.LANGUAGE }}"
        python enhance.py --data ../data/${today}.jsonl
        
    - name: Convert to Markdown
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        source .venv/bin/activate
        today=${{ steps.crawl_step.outputs.crawl_date }}
        export LANGUAGE="${{ vars.LANGUAGE }}"
        cd to_md
        AI_FILE="../data/${today}_AI_enhanced_${LANGUAGE}.jsonl"
        if [ -f "$AI_FILE" ]; then
            python convert.py --data "$AI_FILE"
        else
            python convert.py --data "../data/${today}.jsonl"
        fi

    - name: Archive Summaries
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        ARCHIVE_DIR="Paper_Summaries/$(date +'%Y-%m')"
        mkdir -p "$ARCHIVE_DIR"
        cp data/*.md "$ARCHIVE_DIR/" 2>/dev/null || true
        mkdir -p assets
        ls data/*.jsonl | sed 's|data/||' > assets/file-list.txt

    - name: Commit and Push
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        git config --global user.email "${{ vars.EMAIL }}"
        git config --global user.name "${{ vars.NAME }}"
        REPO_OWNER="${{ github.repository_owner }}"
        REPO_NAME="${{ github.event.repository.name }}"
        if [ -f "js/data-config.js" ]; then
          sed -i "s/PLACEHOLDER_REPO_OWNER/$REPO_OWNER/g" js/data-config.js
          sed -i "s/PLACEHOLDER_REPO_NAME/$REPO_NAME/g" js/data-config.js
        fi
        git add Paper_Summaries/ assets/file-list.txt js/data-config.js
        git commit -m "archive: research update $(date +'%Y-%m-%d')" || echo "No changes"
        for i in {1..3}; do
          git pull origin main --rebase
          if git push origin main; then break; fi
        done

    - name: Send Mail (Gmail SMTP)
      if: steps.dedup_check.outputs.has_new_content == 'true'
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "🎓 论文速递: ${{ steps.crawl_step.outputs.crawl_date }}"
        to: ${{ secrets.MAIL_USERNAME }}
        from: "arXiv AI Assistant"
        body: "今日关于黎曼几何与随机分析的论文总结已生成，请查看附件。"
        attachments: data/*.md
