name: Daily Research Radar

on:
  schedule:
    # GitHub cron is UTC. These two entries plus the UK-time guard below
    # generate once at 08:00 Europe/London across GMT/BST changes.
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-research-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Check UK schedule guard
        id: schedule_guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          uk_hour=$(TZ=Europe/London date "+%H")
          if [ "$uk_hour" = "08" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping scheduled run because Europe/London hour is $uk_hour, not 08."
          fi

      - uses: actions/checkout@v4
        if: steps.schedule_guard.outputs.should_run == 'true'
        with:
          fetch-depth: 0

      - name: Install uv and dependencies
        if: steps.schedule_guard.outputs.should_run == 'true'
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          UV_CACHE_DIR=.uv-cache uv sync --locked

      - name: Run unit tests
        if: steps.schedule_guard.outputs.should_run == 'true'
        run: |
          UV_CACHE_DIR=.uv-cache uv run python -m unittest discover -s tests -v

      - name: Generate Daily Research Radar
        if: steps.schedule_guard.outputs.should_run == 'true'
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          MODEL_NAME: ${{ vars.MODEL_NAME }}
          CATEGORIES: ${{ vars.CATEGORIES }}
          DAILY_TOPIC_MODE: ${{ vars.DAILY_TOPIC_MODE }}
          MAX_KEY_PAPERS_PER_DAY: ${{ vars.MAX_KEY_PAPERS_PER_DAY }}
          MAX_OTHER_PAPERS_PER_DAY: ${{ vars.MAX_OTHER_PAPERS_PER_DAY }}
          SERENDIPITY_RATIO: ${{ vars.SERENDIPITY_RATIO }}
          RESEARCH_PROFILE_PATH: ${{ vars.RESEARCH_PROFILE_PATH }}
          RADAR_MAX_WORKERS: ${{ vars.RADAR_MAX_WORKERS }}
          LLM_TIMEOUT_SECONDS: ${{ vars.LLM_TIMEOUT_SECONDS }}
        run: |
          set -euo pipefail
          today=$(date -u "+%Y-%m-%d")
          echo "today=$today" >> "$GITHUB_OUTPUT"

          export OPENAI_BASE_URL="${OPENAI_BASE_URL:-https://api.deepseek.com}"
          export MODEL_NAME="${MODEL_NAME:-deepseek-chat}"
          export DAILY_TOPIC_MODE="${DAILY_TOPIC_MODE:-rotate}"
          export MAX_KEY_PAPERS_PER_DAY="${MAX_KEY_PAPERS_PER_DAY:-3}"
          export MAX_OTHER_PAPERS_PER_DAY="${MAX_OTHER_PAPERS_PER_DAY:-8}"
          export SERENDIPITY_RATIO="${SERENDIPITY_RATIO:-0.25}"
          export RESEARCH_PROFILE_PATH="${RESEARCH_PROFILE_PATH:-research_profile.yaml}"
          export RADAR_MAX_WORKERS="${RADAR_MAX_WORKERS:-4}"
          export LLM_TIMEOUT_SECONDS="${LLM_TIMEOUT_SECONDS:-60}"

          UV_CACHE_DIR=.uv-cache uv run python daily_research_radar.py --date today

      - name: Build email summary
        if: steps.schedule_guard.outputs.should_run == 'true'
        id: email_summary
        env:
          REPORT_DATE: ${{ steps.generate.outputs.today }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          UV_CACHE_DIR=.uv-cache uv run python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_date = os.environ["REPORT_DATE"]
          owner = os.environ["REPO_OWNER"]
          repo = os.environ["REPO_NAME"]
          enhanced_path = Path(f"data/{report_date}_research_radar_enhanced.jsonl")

          topic = "Daily Research Radar"
          titles = []
          if enhanced_path.exists():
              rows = [json.loads(line) for line in enhanced_path.read_text(encoding="utf-8").splitlines() if line.strip()]
              if rows:
                  topic = rows[0].get("research_radar", {}).get("main_topic") or topic
                  ranked = sorted(
                      rows,
                      key=lambda row: row.get("research_radar", {}).get("scores", {}).get("final_priority_score", 0),
                      reverse=True,
                  )
                  titles = [row.get("title", "Untitled") for row in ranked[:3]]

          dashboard_url = f"https://{owner}.github.io/{repo}/research-radar.html"
          report_url = f"{dashboard_url}?date={report_date}"
          title_lines = "\n".join(f"- {title}" for title in titles) or "- No key paper titles extracted."
          body = f"""Daily Research Radar succeeded for {report_date}.

          Today's main topic:
          {topic}

          Today's HTML report:
          {report_url}

          Main Research Radar dashboard:
          {dashboard_url}

          Key papers:
          {title_lines}

          Status:
          Workflow succeeded and report files were generated and pushed.
          """

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as output:
              output.write(f"topic={topic}\n")
              output.write(f"report_url={report_url}\n")
              output.write(f"dashboard_url={dashboard_url}\n")
              output.write("body<<EOF\n")
              output.write(body)
              output.write("\nEOF\n")
          PY

      - name: Inject repository info into data-config.js
        if: steps.schedule_guard.outputs.should_run == 'true'
        run: |
          sed -i "s/repoOwner: '.*'/repoOwner: '${{ github.repository_owner }}'/" js/data-config.js
          sed -i "s/repoName: '.*'/repoName: '${{ github.event.repository.name }}'/" js/data-config.js

      - name: Commit dashboard/index updates to main branch
        if: steps.schedule_guard.outputs.should_run == 'true'
        run: |
          git config user.email "${{ vars.EMAIL_FROM || 'github-actions[bot]@users.noreply.github.com' }}"
          git config user.name "github-actions[bot]"

          git add research-radar.html js/research-radar.js js/data-config.js css/research-radar.css README.md .github/workflows/run.yml
          if git diff --staged --quiet; then
            echo "No dashboard/index changes to commit on main."
          else
            git commit -m "chore: update Daily Research Radar dashboard"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Prepare report files for data branch
        if: steps.schedule_guard.outputs.should_run == 'true'
        env:
          REPORT_DATE: ${{ steps.generate.outputs.today }}
        run: |
          mkdir -p /tmp/research-radar-data/data /tmp/research-radar-data/assets
          cp "data/${REPORT_DATE}_research_radar.html" /tmp/research-radar-data/data/
          cp "data/${REPORT_DATE}_research_radar.md" /tmp/research-radar-data/data/
          cp "data/${REPORT_DATE}_research_radar_enhanced.jsonl" /tmp/research-radar-data/data/
          cp data/research_radar_history.json /tmp/research-radar-data/data/

      - name: Commit report files to data branch
        if: steps.schedule_guard.outputs.should_run == 'true'
        env:
          REPORT_DATE: ${{ steps.generate.outputs.today }}
        run: |
          git config user.email "${{ vars.EMAIL_FROM || 'github-actions[bot]@users.noreply.github.com' }}"
          git config user.name "github-actions[bot]"

          if git ls-remote --exit-code --heads origin data; then
            git fetch origin data
            git checkout data
            git pull origin data --rebase || true
          else
            git checkout --orphan data
            git rm -rf --cached . 2>/dev/null || true
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            echo "# Data Branch" > README.md
            git add README.md
            git commit -m "chore: initialize data branch"
            git push origin data
          fi

          mkdir -p data assets
          cp /tmp/research-radar-data/data/* data/
          ls data/* | sed 's|data/||' | sort > assets/file-list.txt
          git add \
            "data/${REPORT_DATE}_research_radar.html" \
            "data/${REPORT_DATE}_research_radar.md" \
            "data/${REPORT_DATE}_research_radar_enhanced.jsonl" \
            data/research_radar_history.json \
            assets/file-list.txt

          if git diff --staged --quiet; then
            echo "No report file changes to commit on data branch."
          else
            git commit -m "update: Daily Research Radar ${REPORT_DATE}"
            git push origin data
          fi

      - name: Email Daily Research Radar
        if: steps.schedule_guard.outputs.should_run == 'true' && vars.ENABLE_EMAIL != 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ vars.SMTP_HOST }}
          server_port: ${{ vars.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Daily Research Radar — ${{ steps.generate.outputs.today }}
          to: ${{ vars.EMAIL_TO }}
          from: ${{ vars.EMAIL_FROM }}
          body: ${{ steps.email_summary.outputs.body }}
