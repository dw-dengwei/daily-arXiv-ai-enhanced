name: arXiv-daily-link-delivery

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: '是否强制运行？'
        required: true
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      KEYWORDS: "Riemannian|Manifold|Stochastic|Brownian motion|Wasserstein|Optimal Transport|McKean|Curvature|Ricci|Martingale|Girsanov|DDSDE|Bismut|Distribution[ -]Dependent"
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        uv sync

    - name: Crawl arXiv papers
      id: crawl_step
      run: |
        source .venv/bin/activate
        today=$(date -u "+%Y-%m-%d")
        cd daily_arxiv
        scrapy crawl arxiv -o ../data/${today}.jsonl
        if [ ! -f "../data/${today}.jsonl" ]; then
            echo "today_has_data=false" >> $GITHUB_OUTPUT
        else
            echo "today_has_data=true" >> $GITHUB_OUTPUT
            echo "crawl_date=$today" >> $GITHUB_OUTPUT
        fi

    - name: Generate Link Report
      id: filter_step
      if: steps.crawl_step.outputs.today_has_data == 'true'
      run: |
        source .venv/bin/activate
        today=${{ steps.crawl_step.outputs.crawl_date }}
        
        # 使用 Python 生成多行内容并写入 $GITHUB_ENV
        python -c "
        import json, os, re
        input_file = f'data/{os.environ.get(\"today\", \"$today\")}.jsonl'
        keywords = os.environ.get('KEYWORDS', '')
        pattern = re.compile(keywords, re.IGNORECASE)
        
        count = 0
        mail_content = '你好！今日为您筛选了相关论文：\n\n'
        
        if os.path.exists(input_file):
            with open(input_file, 'r') as f:
                for line in f:
                    data = json.loads(line)
                    title = data.get('title', '').replace('\n', ' ')
                    abstract = data.get('abstract', '')
                    pdf_url = data.get('pdf_url', '')
                    
                    if pattern.search(title + ' ' + abstract):
                        count += 1
                        mail_content += f'{count}. {title}\n'
                        mail_content += f'   PDF: {pdf_url}\n\n'
        
        # 安全地将多行字符串写入环境变量
        with open(os.environ['GITHUB_ENV'], 'a') as env_file:
            env_file.write('MAIL_BODY<<EOF\n')
            env_file.write(mail_content)
            env_file.write('\nEOF\n')
            
        with open(os.environ['GITHUB_OUTPUT'], 'a') as go:
            go.write(f'paper_count={count}\n')
        "

    - name: Send Mail (Gmail SMTP)
      if: steps.filter_step.outputs.paper_count != '0'
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "🎓 arXiv 论文直链推送 [${{ steps.filter_step.outputs.paper_count }} 篇]"
        to: ${{ secrets.MAIL_USERNAME }}
        from: "arXiv Link Bot <${{ secrets.MAIL_USERNAME }}>"
        # 修复：引用上一步生成的环境变量
        body: ${{ env.MAIL_BODY }}
